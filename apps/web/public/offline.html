<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PartyRadar — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #04040d;
      color: #e0f2fe;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 32px;
      text-align: center;
    }
    .logo {
      font-size: 48px;
      filter: drop-shadow(0 0 20px rgba(0,229,255,0.8));
    }
    .brand {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 0.2em;
      color: #00e5ff;
      text-shadow: 0 0 20px rgba(0,229,255,0.6);
    }
    .title {
      font-size: 36px;
      font-weight: 900;
      letter-spacing: 0.1em;
      color: #ff006e;
      text-shadow: 0 0 20px rgba(255,0,110,0.5);
    }
    .sub {
      font-size: 16px;
      color: rgba(224,242,254,0.5);
      letter-spacing: 0.05em;
      max-width: 280px;
      line-height: 1.6;
    }
    .retry {
      margin-top: 16px;
      padding: 14px 32px;
      background: transparent;
      border: 1px solid rgba(0,229,255,0.4);
      border-radius: 8px;
      color: #00e5ff;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.15em;
      cursor: pointer;
      transition: all 0.2s;
    }
    .retry:hover {
      background: rgba(0,229,255,0.1);
      border-color: #00e5ff;
    }
    .line {
      width: 120px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #00e5ff, transparent);
    }
  </style>
</head>
<body>
  <div class="logo">⚡</div>
  <div class="brand">PARTYRADAR</div>
  <div class="line"></div>
  <div class="title">YOU'RE OFFLINE</div>
  <p class="sub">The party is still happening — you just need a signal to find it.</p>
  <button class="retry" onclick="window.location.reload()">TRY AGAIN →</button>
</body>
</html>
