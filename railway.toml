[build]
builder = "nixpacks"
buildCommand = "npm install --prefer-offline && npx prisma generate --schema=packages/db/prisma/schema.prisma"

[deploy]
# prisma db push removed from startCommand — it hangs indefinitely when the
# Railway Postgres DB is cold/slow, killing every deploy. Schema pushes must
# be done manually via: railway run npx prisma db push --accept-data-loss
# when there is an actual schema migration to apply.
startCommand = "npx tsx packages/api/src/index.ts"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
