[build]
builder = "nixpacks"
# Compiles TypeScript → JS so the API runs with plain `node` (no tsx).
# Eliminates tsx's ESM loader from the runtime path — tsx's synchronous
# esbuild transform was blocking the Node.js event loop during Prisma's
# native binary initialisation, causing zombie deploys.
buildCommand = "npm install --prefer-offline && npx prisma generate --schema=packages/db/prisma/schema.prisma && npm run build -w packages/shared && npm run build -w packages/db && npm run build -w packages/api"

[deploy]
# prisma db push removed from startCommand — it hangs indefinitely when the
# Railway Postgres DB is cold/slow, killing every deploy. Schema pushes must
# be done manually via: railway run npx prisma db push --accept-data-loss
# when there is an actual schema migration to apply.
startCommand = "node --max-old-space-size=450 packages/api/dist/index.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
