[build]
# Dockerfile guarantees a consistent node:20-bookworm-slim environment at both
# build and runtime — same OpenSSL 3.0.x, same glibc — so Prisma's binary query
# engine binary downloaded at build time runs without platform-mismatch crashes.
builder = "dockerfile"

[deploy]
# prisma db push removed from startCommand — it hangs indefinitely when the
# Railway Postgres DB is cold/slow, killing every deploy. Schema pushes must
# be done manually via: railway run npx prisma db push --accept-data-loss
# when there is an actual schema migration to apply.
startCommand = "node packages/api/dist/index.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
